name: Deploy production

on:
  push:
    tags: ["v*"]

concurrency:
  group: ozby-dev-production-deploy
  cancel-in-progress: false

jobs:
  resolve-release:
    runs-on: ubuntu-latest
    outputs:
      release_version: ${{ steps.resolve.outputs.release_version }}
    steps:
      - name: Resolve release version
        id: resolve
        shell: bash
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          release_version="${REF_NAME#v}"
          if [[ ! "${release_version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-+][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid semantic release version: ${release_version}" >&2
            exit 1
          fi
          printf 'release_version=%s\n' "${release_version}" >> "$GITHUB_OUTPUT"

  deploy:
    needs: resolve-release
    uses: webpresso/agent-kit/.github/workflows/cloudflare-production.yml@4ba75c74138e4bbfa2b72189e6f0a3dd05fef7a9
    with:
      install_command: pnpm install --frozen-lockfile
      verify_command: |
        pnpm run verify:secrets
        pnpm run lint
        pnpm run typecheck
        pnpm run test
        pnpm run verify:deploy-contract
      deploy_command: bun infra/src/deploy/deploy-production.ts --skip-smoke
      smoke_command: >
        node --input-type=module --eval "const urls=['https://ozby.dev/health','https://ozby.dev/'];
        const wait=async(url,attempts)=>{for(let i=0;i<attempts;i+=1){try{const res=await fetch(url,{headers:{'user-agent':'ozby-dev prod smoke'}}); if(res.ok) return;}catch{} await new Promise((r)=>setTimeout(r,5000));} throw new Error('Timed out waiting for '+url);};
        for (const url of urls) await wait(url, url.endsWith('/health') ? 24 : 12);"
      release_version: ${{ needs.resolve-release.outputs.release_version }}
      runner: ubuntu-latest
    secrets:
      ci_secret_provider_token: ${{ secrets.DOPPLER_SERVICE_TOKEN || secrets.DOPPLER_TOKEN }}
