name: Release

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  packages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  NODE_AUTH_TOKEN: ${{ github.token }}

jobs:
  release:
    uses: webpresso/github-actions/.github/workflows/changesets-release.yml@aaf5e03cb7b215bcc8232858ebcf4cbbec2a8c0e
    with:
      install_command: |
        vp install --frozen-lockfile --ignore-scripts
      version_command: vp run version
      publish_command: vp run release:publish
      runner: ubuntu-latest

  # GitHub Actions does not support referencing a reusable-workflow job's
  # outputs directly in a second reusable-workflow job's `with:` or `if:`.
  # This thin bridge job passes the outputs through a regular job so the
  # deploy call below can consume them without triggering a startup_failure.
  gate:
    needs: release
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ needs.release.outputs.should_deploy }}
      release_version: ${{ needs.release.outputs.release_version }}
    steps:
      - run: "true"

  deploy:
    needs: gate
    if: ${{ needs.gate.outputs.should_deploy == 'true' }}
    uses: webpresso/github-actions/.github/workflows/cloudflare-production.yml@aaf5e03cb7b215bcc8232858ebcf4cbbec2a8c0e
    with:
      install_command: |
        vp install --frozen-lockfile --ignore-scripts
      verify_command: |
        vp run verify:secrets
        wp lint
        wp typecheck
        vp run test
        wp audit cloudflare-deploy-contract
      deploy_command: bun infra/src/deploy/deploy-production.ts --release-version "${RELEASE_VERSION}" --skip-smoke
      smoke_command: >
        node --input-type=module --eval "const urls=['https://ozby.dev/health','https://ozby.dev/'];
        const wait=async(url,attempts)=>{for(let i=0;i<attempts;i+=1){try{const res=await fetch(url,{headers:{'user-agent':'ozby-dev prod smoke'}}); if(res.ok) return;}catch{} await new Promise((r)=>setTimeout(r,5000));} throw new Error('Timed out waiting for '+url);};
        for (const url of urls) await wait(url, url.endsWith('/health') ? 24 : 12);"
      release_version: ${{ needs.gate.outputs.release_version }}
      secret_profile: production
      runner: ubuntu-latest
    secrets:
      ci_secret_provider_token: ${{ secrets.CI_SECRET_PROVIDER_TOKEN_PRODUCTION }}
