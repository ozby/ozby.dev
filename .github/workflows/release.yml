name: Release

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  packages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  NODE_AUTH_TOKEN: ${{ github.token }}

jobs:
  release-preflight:
    name: release-preflight
    runs-on: ubuntu-latest
    outputs:
      has_version_diff: ${{ steps.version-diff.outputs.has_version_diff }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
      - name: Install shared Webpresso CLIs
        shell: bash
        run: |
          set -euo pipefail
          VITE_PLUS_VERSION=$(node -p "require('./package.json').devDependencies['vite-plus'].replace(/^[^0-9]*/, '')")
          AGENT_KIT_VERSION="${WP_SETUP_AGENT_KIT_VERSION:-2.3.2}"
          npm install -g "vite-plus@${VITE_PLUS_VERSION}" "@webpresso/agent-kit@${AGENT_KIT_VERSION}"
      - run: vp install --frozen-lockfile
      - name: Detect versionable release diff
        id: version-diff
        shell: bash
        run: |
          set -euo pipefail
          vp run version
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "has_version_diff=true" >> "$GITHUB_OUTPUT"
            echo "Version command produced a release diff; running shared release workflow."
          else
            echo "has_version_diff=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping shared release workflow because vp run version produced no commitable diff."
          fi

  release:
    needs: release-preflight
    if: ${{ needs.release-preflight.outputs.has_version_diff == 'true' }}
    uses: webpresso/github-actions/.github/workflows/changesets-release.yml@aaf5e03cb7b215bcc8232858ebcf4cbbec2a8c0e
    with:
      install_command: |
        vp install --frozen-lockfile
      version_command: vp run version
      publish_command: vp run release:publish
      runner: ubuntu-latest

  gate:
    needs:
      - release-preflight
      - release
    if: ${{ always() }}
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.release.outputs.should_deploy }}
      release_version: ${{ steps.release.outputs.release_version }}
    steps:
      - name: Resolve release result
        id: release
        shell: bash
        env:
          HAS_VERSION_DIFF: ${{ needs.release-preflight.outputs.has_version_diff }}
          RELEASE_RESULT: ${{ needs.release.result }}
          SHOULD_DEPLOY: ${{ needs.release.outputs.should_deploy }}
          RELEASE_VERSION: ${{ needs.release.outputs.release_version }}
        run: |
          set -euo pipefail
          if [[ "${HAS_VERSION_DIFF}" != "true" ]]; then
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
            echo "release_version=" >> "$GITHUB_OUTPUT"
            echo "No versionable release diff; deployment remains skipped."
            exit 0
          fi
          if [[ "${RELEASE_RESULT}" != "success" ]]; then
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
            echo "release_version=" >> "$GITHUB_OUTPUT"
            echo "Shared release workflow result: ${RELEASE_RESULT}; deployment remains skipped."
            exit 0
          fi
          echo "should_deploy=${SHOULD_DEPLOY}" >> "$GITHUB_OUTPUT"
          echo "release_version=${RELEASE_VERSION}" >> "$GITHUB_OUTPUT"

  deploy:
    needs: gate
    if: ${{ needs.gate.outputs.should_deploy == 'true' }}
    uses: webpresso/github-actions/.github/workflows/cloudflare-production.yml@aaf5e03cb7b215bcc8232858ebcf4cbbec2a8c0e
    with:
      install_command: |
        vp install --frozen-lockfile
      verify_command: |
        vp run verify:secrets
        wp lint
        wp typecheck
        vp run test
        wp audit cloudflare-deploy-contract
      deploy_command: bun infra/src/deploy/deploy-production.ts --skip-smoke
      smoke_command: >
        node --input-type=module --eval "const urls=['https://ozby.dev/health','https://ozby.dev/'];
        const wait=async(url,attempts)=>{for(let i=0;i<attempts;i+=1){try{const res=await fetch(url,{headers:{'user-agent':'ozby-dev prod smoke'}}); if(res.ok) return;}catch{} await new Promise((r)=>setTimeout(r,5000));} throw new Error('Timed out waiting for '+url);};
        for (const url of urls) await wait(url, url.endsWith('/health') ? 24 : 12);"
      release_version: ${{ needs.gate.outputs.release_version }}
      secret_profile: production
      runner: ubuntu-latest
    secrets:
      ci_secret_provider_token: ${{ secrets.CI_SECRET_PROVIDER_TOKEN_PRODUCTION }}
