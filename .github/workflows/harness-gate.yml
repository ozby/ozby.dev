name: Harness Selection Gate (planned-only)

on:
  pull_request:
    paths:
      - "catalog/agent/harness-surfaces.yaml"
      - "catalog/agent/skills/**"
      - "agent-rules/**"
      - "AGENTS.md"
      - ".husky/**"
      - ".github/actions/**"
      - ".github/workflows/**"
      - ".claude/**"
      - ".codex/**"
      - "infra/**"
      - "package.json"
      - "test/**"
      - "scripts/**"
      - "apps/client/src/**"
      - "apps/workers/**"

permissions:
  contents: read
  packages: read

env:
  NODE_AUTH_TOKEN: ${{ github.token }}

jobs:
  verdict:
    name: Planned-only harness selection verdict
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
      - name: Install shared Webpresso CLIs
        shell: bash
        run: |
          set -euo pipefail
          VITE_PLUS_VERSION=$(node -p "require('./package.json').devDependencies['vite-plus'].replace(/^[^0-9]*/, '')")
          AGENT_KIT_VERSION="${WP_SETUP_AGENT_KIT_VERSION:-2.3.2}"
          npm install -g "vite-plus@${VITE_PLUS_VERSION}" "@webpresso/agent-kit@${AGENT_KIT_VERSION}"
      - run: vp install --frozen-lockfile
      - name: Produce planned-only harness selection verdict
        run: wp test --file test/ci-governance-contract.test.ts
