name: Harness Selection Gate (planned-only)

on:
  pull_request:
    paths:
      - "catalog/agent/harness-surfaces.yaml"
      - "catalog/agent/skills/**"
      - "agent-rules/**"
      - "AGENTS.md"
      - ".husky/**"
      - ".github/actions/**"
      - ".github/workflows/**"
      - "infra/**"
      - "package.json"
      - "test/**"
      - "scripts/**"
      - "apps/client/src/**"
      - "apps/workers/**"

permissions:
  contents: read
  packages: read

env:
  NODE_AUTH_TOKEN: ${{ github.token }}

jobs:
  verdict:
    name: Planned-only harness selection verdict
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
      - name: Install shared Webpresso CLIs
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL https://vite.plus | bash
          export PATH="$HOME/.vite-plus/bin:$PATH"
          echo "$HOME/.vite-plus/bin" >> "$GITHUB_PATH"
          vp install -g "@webpresso/agent-kit@2.3.2"
      - run: vp install --frozen-lockfile --ignore-scripts
      - name: Produce planned-only harness selection verdict
        run: wp test --file test/ci-governance-contract.test.ts
