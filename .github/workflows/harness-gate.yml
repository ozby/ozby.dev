name: Harness Selection Gate (planned-only)

on:
  pull_request:
    paths:
      - "catalog/agent/harness-surfaces.yaml"
      - "catalog/agent/skills/**"
      - "agent-rules/**"
      - "AGENTS.md"
      - ".husky/**"
      - ".github/actions/**"
      - ".github/workflows/**"
      - "infra/**"
      - "package.json"
      - "test/**"
      - "scripts/**"
      - "apps/client/src/**"
      - "apps/workers/**"

permissions:
  contents: read
  packages: read

env:
  NODE_AUTH_TOKEN: ${{ github.token }}

jobs:
  verdict:
    name: Planned-only harness selection verdict
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
      - uses: voidzero-dev/setup-vp@13e7afb99c66525824db54e107d667216e795d37 # v1.14.0
        with:
          node-version: "24.16.0"
          cache: true
          run-install: false
      - uses: webpresso/agent-kit/.github/actions/setup-wp@d9ea3a1dc36545fd1e652e23ba2b46cb8d58b6a0
      - name: Check workflow action pins
        run: node scripts/check-workflow-action-pins.ts
      - run: vp install --frozen-lockfile --ignore-scripts
      - name: Produce planned-only harness selection verdict
        run: wp test --file test/ci-governance-contract.test.ts
