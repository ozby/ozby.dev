name: Harness Selection Gate (planned-only)

on:
  pull_request:
    paths:
      - 'catalog/agent/harness-surfaces.yaml'
      - 'catalog/agent/skills/**'
      - 'agent-rules/**'
      - 'AGENTS.md'
      - '.husky/**'
      - '.github/actions/**'
      - '.github/workflows/**'
      - '.claude/**'
      - '.codex/**'
      - 'infra/**'
      - 'package.json'
      - 'test/**'
      - 'scripts/**'
      - 'apps/client/src/**'
      - 'apps/workers/**'

permissions:
  contents: read

jobs:
  verdict:
    name: Planned-only harness selection verdict
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '24.16.0'
          cache: pnpm
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest
      - run: vp install --frozen-lockfile
      - name: Produce planned-only harness selection verdict
        run: vp run test -- --runInBand test/ci-governance-contract.test.ts
