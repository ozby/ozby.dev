name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  NODE_AUTH_TOKEN: ${{ github.token }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

jobs:
  wp-check:
    name: wp-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
      - uses: voidzero-dev/setup-vp@13e7afb99c66525824db54e107d667216e795d37 # v1.14.0
        with:
          node-version: "24.16.0"
          cache: true
          run-install: false
      - uses: webpresso/github-actions/.github/actions/setup-wp@c2c71a7a4be446fc6858e6b57bf55a11ccfa2d88
        with:
          version: "3.1.11"
      - name: Check workflow action pins
        run: node scripts/check-workflow-action-pins.ts
      - run: vp install --frozen-lockfile --ignore-scripts
      - run: wp audit hook-vendor-drift
      - run: wp audit harness-surfaces
      - run: wp audit architecture-drift --root .
      - run: wp lint
      - run: wp typecheck
      - run: vp run test
      - run: wp audit blueprint-lifecycle

  mutation:
    if: ${{ github.event_name == 'push' && !startsWith(github.event.head_commit.message, 'Version Packages') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
      - uses: voidzero-dev/setup-vp@13e7afb99c66525824db54e107d667216e795d37 # v1.14.0
        with:
          node-version: "24.16.0"
          cache: true
          run-install: false
      - uses: webpresso/github-actions/.github/actions/setup-wp@c2c71a7a4be446fc6858e6b57bf55a11ccfa2d88
        with:
          version: "3.1.11"
      - run: vp install --frozen-lockfile --ignore-scripts
      - run: wp test --mutation
