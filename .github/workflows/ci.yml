name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  wp-check:
    name: wp-check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
      - uses: webpresso/github-actions/.github/actions/setup-webpresso-toolchain@5cd210dadf5cd0c04ccfaf3e10025efd7dbd6439
        with:
          cli-global-packages: "vite-plus @webpresso/agent-kit"
      - run: vp install --frozen-lockfile
      - run: WP_SKIP_UPDATE_CHECK=1 wp setup
      - run: git checkout -- package.json .gitignore AGENTS.md
      - run: rm -f scripts/check-no-dev-vars.ts scripts/audit-secret-provider-quarantine.ts
      - run: wp audit hook-vendor-drift
      - run: wp audit harness-surfaces
      - run: wp audit architecture-drift --root .
      - run: wp lint
      - run: wp typecheck
      - run: vp run test
      - run: wp audit blueprint-lifecycle
      - name: Validate Lore commits
        run: |
          BASE=${{ github.base_ref || 'main' }}
          git fetch origin "$BASE" --depth=50 2>/dev/null || true
          COMMITS=$(git log "origin/$BASE..HEAD" --no-merges --format="%H" 2>/dev/null || true)
          if [ -z "$COMMITS" ]; then
            echo "No branch commits to validate."
            exit 0
          fi
          FAIL=0
          for SHA in $COMMITS; do
            SUBJECT=$(git log -1 --format="%s" "$SHA")
            if [ "$SUBJECT" = "Version Packages" ]; then
              echo "Skipping lore validation for generated Version Packages commit: $SHA"
              continue
            fi
            git log -1 --format="%B" "$SHA" > /tmp/commit-msg.txt
            WP_SKIP_UPDATE_CHECK=1 vp exec wp audit commit-message --require-lore --message-file /tmp/commit-msg.txt || FAIL=1
          done
          exit $FAIL

  mutation:
    if: ${{ github.event_name == 'push' && !startsWith(github.event.head_commit.message, 'Version Packages') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
      - uses: webpresso/github-actions/.github/actions/setup-webpresso-toolchain@5cd210dadf5cd0c04ccfaf3e10025efd7dbd6439
        with:
          cli-global-packages: "vite-plus @webpresso/agent-kit"
      - run: vp install --frozen-lockfile
      - run: wp test --mutation

  deploy-preview:
    name: Deploy preview (PR)
    if: ${{ github.event_name == 'pull_request' && github.event.action != 'closed' && github.head_ref != 'changeset-release/main' }}
    needs: wp-check
    permissions:
      contents: read
      packages: read
      id-token: write
    concurrency:
      group: ozby-dev-preview-pr-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    uses: webpresso/github-actions/.github/workflows/cloudflare-preview.yml@5cd210dadf5cd0c04ccfaf3e10025efd7dbd6439
    with:
      lane: preview_pr_${{ github.event.pull_request.number }}
      mode: deploy
      install_command: |
        vp install --frozen-lockfile
      verify_command: ":"
      deploy_command: wp deploy --lane preview_pr_${{ github.event.pull_request.number }}
      smoke_command: >
        node --input-type=module --eval "const url='https://preview-pr-${{ github.event.pull_request.number }}.ozby.dev';
        const run=async()=>{for(let i=0;i<24;i+=1){try{const res=await fetch(url,{headers:{'user-agent':'ozby-dev preview smoke'}}); if(res.ok) return;}catch{} await new Promise((r)=>setTimeout(r,5000));} throw new Error('Timed out waiting for '+url);}; await run();"
      secret_profile: preview
      runner: ubuntu-latest
    secrets:
      ci_secret_provider_token: ${{ secrets.CI_SECRET_PROVIDER_TOKEN }}
