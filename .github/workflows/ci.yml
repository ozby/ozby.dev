name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  NODE_AUTH_TOKEN: ${{ github.token }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

jobs:
  wp-check:
    name: wp-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
      - name: Install shared Webpresso CLIs
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL https://vite.plus | bash
          export PATH="$HOME/.vite-plus/bin:$PATH"
          echo "$HOME/.vite-plus/bin" >> "$GITHUB_PATH"
          vp install -g "@webpresso/agent-kit@2.3.2"
      - run: vp install --frozen-lockfile --ignore-scripts
      - run: wp audit hook-vendor-drift
      - run: wp audit harness-surfaces
      - run: wp audit architecture-drift --root .
      - run: wp lint
      - run: wp typecheck
      - run: vp run test
      - run: wp audit blueprint-lifecycle

      - name: Validate Lore commits
        run: |
          BASE=${{ github.base_ref || 'main' }}
          git fetch origin "$BASE" --depth=50 2>/dev/null || true
          COMMITS=$(git log "origin/$BASE..HEAD" --no-merges --format="%H" 2>/dev/null || true)
          if [ -z "$COMMITS" ]; then
            echo "No branch commits to validate."
            exit 0
          fi
          FAIL=0
          for SHA in $COMMITS; do
            SUBJECT=$(git log -1 --format="%s" "$SHA")
            if [ "$SUBJECT" = "Version Packages" ]; then
              echo "Skipping lore validation for generated Version Packages commit: $SHA"
              continue
            fi
            git log -1 --format="%B" "$SHA" > /tmp/commit-msg.txt
            WP_SKIP_UPDATE_CHECK=1 vp exec wp audit commit-message --require-lore --message-file /tmp/commit-msg.txt || FAIL=1
          done
          exit $FAIL

  mutation:
    if: ${{ github.event_name == 'push' && !startsWith(github.event.head_commit.message, 'Version Packages') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
      - name: Install shared Webpresso CLIs
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL https://vite.plus | bash
          export PATH="$HOME/.vite-plus/bin:$PATH"
          echo "$HOME/.vite-plus/bin" >> "$GITHUB_PATH"
          vp install -g "@webpresso/agent-kit@2.3.2"
      - run: vp install --frozen-lockfile --ignore-scripts
      - run: wp test --mutation
