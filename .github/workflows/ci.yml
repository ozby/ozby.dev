name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  NODE_AUTH_TOKEN: ${{ github.token }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

jobs:
  wp-check:
    name: wp-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
      - name: Install shared Webpresso CLIs
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL https://vite.plus | bash
          export PATH="$HOME/.vite-plus/bin:$PATH"
          echo "$HOME/.vite-plus/bin" >> "$GITHUB_PATH"
          vp install -g "@webpresso/agent-kit@2.4.1"
      - run: vp install --frozen-lockfile --ignore-scripts
      - run: wp audit hook-vendor-drift
      - run: wp audit harness-surfaces
      - run: wp audit architecture-drift --root .
      - run: wp lint
      - run: wp typecheck
      - run: vp run test
      - run: wp audit blueprint-lifecycle

  mutation:
    if: ${{ github.event_name == 'push' && !startsWith(github.event.head_commit.message, 'Version Packages') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
      - name: Install shared Webpresso CLIs
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL https://vite.plus | bash
          export PATH="$HOME/.vite-plus/bin:$PATH"
          echo "$HOME/.vite-plus/bin" >> "$GITHUB_PATH"
          vp install -g "@webpresso/agent-kit@2.4.1"
      - run: vp install --frozen-lockfile --ignore-scripts
      - run: wp test --mutation
