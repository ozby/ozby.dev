name: Security scan

on:
  pull_request:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  scan:
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.ref != 'changeset-release/main' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: OSV Scanner
        uses: google/osv-scanner-action/osv-scanner-action@v2.3.8
        continue-on-error: true
        with:
          scan-args: |-
            --recursive
            ./

      - uses: pnpm/action-setup@ac6db6d3c1f721f886538a378a2d73e85697340a # v6
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "24.16.0"
          cache: pnpm
      - name: Install shared Webpresso tooling
        run: npm install -g vite-plus@0.1.24 @webpresso/agent-kit@2.1.1
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest
      - run: vp install --frozen-lockfile

      - name: Secretlint
        run: vp exec secretlint "**/*"
