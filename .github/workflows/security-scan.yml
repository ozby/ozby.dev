name: Security scan

on:
  pull_request:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

env:
  NODE_AUTH_TOKEN: ${{ github.token }}

jobs:
  security:
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.ref != 'changeset-release/main' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
      security-events: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: OSV Scanner
        uses: google/osv-scanner-action/osv-scanner-action@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
        continue-on-error: true
        with:
          scan-args: |-
            --recursive
            ./

      - uses: voidzero-dev/setup-vp@13e7afb99c66525824db54e107d667216e795d37 # v1.14.0
        with:
          node-version: "24.16.0"
          cache: true
          run-install: false
      - uses: webpresso/github-actions/.github/actions/setup-wp@c2c71a7a4be446fc6858e6b57bf55a11ccfa2d88
        with:
          version: "3.1.11"
      - name: Check workflow action pins
        run: node scripts/check-workflow-action-pins.ts
      - run: vp install --frozen-lockfile --ignore-scripts
      - name: Secretlint
        run: vp exec secretlint "**/*"
