version: 1
surfaces:
  - id: codex-hooks
    title: Retired repo-local Codex hook surface
    owner: agent-kit
    kind: hook
    lifecycle: locked
    paths:
      - path: AGENTS.md
        status: concrete
    triggers:
      - manual cleanup
    evidence:
      - AGENTS.md
  - id: claude-hooks
    title: Retired repo-local Claude hook surface
    owner: agent-kit
    kind: hook
    lifecycle: locked
    paths:
      - path: AGENTS.md
        status: concrete
    triggers:
      - manual cleanup
    evidence:
      - AGENTS.md
  - id: generated-agent-surfaces
    title: Generated agent instructions and skills
    owner: agent-kit
    kind: generated-surface
    lifecycle: locked
    paths:
      - path: catalog/agent/skills
        status: projected
      - path: agent-rules
        status: projected
    triggers:
      - wp setup
      - wp sync
      - wp audit guardrails
    evidence:
      - catalog/agent/skills/monorepo-navigation/SKILL.md
  - id: secret-gate
    title: Secret-provider quarantine and no-dev-vars enforcement
    owner: agent-kit
    kind: secret-gate
    lifecycle: locked
    paths:
      - path: .github/workflows/ci.yml
        status: concrete
      - path: .husky/pre-commit
        status: concrete
      - path: infra/src/deploy
        status: concrete
    triggers:
      - wp audit no-dev-vars
      - wp audit secret-provider-quarantine
      - vp run verify:secrets
    evidence:
      - package.json
      - test/ci-governance-contract.test.ts
  - id: permission-policy
    title: Retired repo-local permission policy surface
    owner: agent-kit
    kind: policy
    lifecycle: locked
    paths:
      - path: AGENTS.md
        status: concrete
    triggers:
      - manual cleanup
    evidence:
      - AGENTS.md
  - id: omx-runtime-state
    title: Retired repo-local OMX runtime surface
    owner: oh-my-codex
    kind: runtime-state
    lifecycle: governed
    paths:
      - path: AGENTS.md
        status: concrete
    triggers:
      - manual cleanup
    evidence:
      - AGENTS.md
  - id: harness-regression-gate
    title: Reference consumer regression gate
    owner: agent-kit
    kind: regression-gate
    lifecycle: governed
    paths:
      - path: .github/workflows
        status: concrete
      - path: apps/workers
        status: concrete
      - path: infra
        status: concrete
      - path: infra/src/deploy
        status: concrete
      - path: test
        status: concrete
      - path: apps/client/src
        status: concrete
    triggers:
      - wp audit harness-surfaces
      - wp audit guardrails
    evidence:
      - test/ci-governance-contract.test.ts
  - id: agent-overlays
    title: Evidence-backed agent overlays
    owner: agent-kit
    kind: overlay
    lifecycle: experimental
    paths:
      - path: agent-rules
        status: projected
      - path: catalog/agent/skills
        status: projected
    triggers:
      - wp sync
      - wp audit guardrails
    evidence:
      - catalog/agent/harness-surfaces.yaml
