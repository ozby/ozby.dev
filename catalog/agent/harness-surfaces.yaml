version: 1
surfaces:
  - id: codex-hooks
    title: Codex hook runtime
    owner: agent-kit
    kind: hook
    lifecycle: locked
    paths:
      - path: .codex
        status: projected
    triggers:
      - wp setup
      - wp audit guardrails
    evidence:
      - AGENTS.md
  - id: claude-hooks
    title: Claude hook runtime
    owner: agent-kit
    kind: hook
    lifecycle: locked
    paths:
      - path: .claude
        status: projected
    triggers:
      - wp setup
      - wp audit guardrails
    evidence:
      - AGENTS.md
  - id: generated-agent-surfaces
    title: Generated agent instructions and skills
    owner: agent-kit
    kind: generated-surface
    lifecycle: locked
    paths:
      - path: catalog/agent/skills
        status: concrete
      - path: agent-rules
        status: concrete
      - path: .agent
        status: projected
    triggers:
      - wp setup
      - wp sync
      - wp audit guardrails
    evidence:
      - catalog/agent/skills/monorepo-navigation/SKILL.md
  - id: permission-policy
    title: Prompt-time permission and deny policy
    owner: agent-kit
    kind: policy
    lifecycle: locked
    paths:
      - path: .codex/hooks.json
        status: concrete
      - path: .codex/managed-hooks/wp-pretool-guard.sh
        status: concrete
      - path: .claude/settings.json
        status: concrete
    triggers:
      - wp setup
      - wp audit guardrails
      - git commit
    evidence:
      - .github/workflows/ci.yml
      - AGENTS.md
  - id: secret-gate
    title: Secret-provider quarantine and no-dev-vars enforcement
    owner: agent-kit
    kind: secret-gate
    lifecycle: locked
    paths:
      - path: .github/workflows/ci.yml
        status: concrete
      - path: .husky/pre-commit
        status: concrete
      - path: infra/src/deploy
        status: concrete
    triggers:
      - wp audit no-dev-vars
      - wp audit secret-provider-quarantine
      - vp run verify:secrets
    evidence:
      - package.json
      - test/ci-governance-contract.test.ts
  - id: omx-runtime-state
    title: OMX runtime and workflow state
    owner: oh-my-codex
    kind: runtime-state
    lifecycle: governed
    paths:
      - path: .omx
        status: projected
    triggers:
      - omx ultragoal checkpoint
      - omx team status
    evidence:
      - AGENTS.md
  - id: harness-regression-gate
    title: Reference consumer regression gate
    owner: agent-kit
    kind: regression-gate
    lifecycle: governed
    paths:
      - path: .github/workflows
        status: concrete
      - path: apps/workers
        status: concrete
      - path: infra
        status: concrete
      - path: infra/src/deploy
        status: concrete
      - path: test
        status: concrete
      - path: apps/client/src
        status: concrete
    triggers:
      - wp audit harness-surfaces
      - wp audit guardrails
    evidence:
      - test/ci-governance-contract.test.ts
  - id: agent-overlays
    title: Evidence-backed agent overlays
    owner: agent-kit
    kind: overlay
    lifecycle: experimental
    paths:
      - path: agent-rules
        status: concrete
      - path: catalog/agent/skills
        status: concrete
    triggers:
      - wp sync
      - wp audit guardrails
    evidence:
      - catalog/agent/harness-surfaces.yaml
